<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sheethal Boda | Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#0b1220;
      color:#fff;
      scroll-behavior:smooth;
    }

    .navbar{
      background:rgba(10,15,30,0.8);
      backdrop-filter: blur(10px);
    }

    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      text-align:center;
      background:linear-gradient(to right,#0b1220,#111a33);
    }

    .hero h1{
      font-size:60px;
      font-weight:700;
    }

    .hero-icon{
      font-size:70px;
      color:#00d4ff;
      animation: floatIcon 3s ease-in-out infinite;
      margin-bottom:10px;
    }

    @keyframes floatIcon{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    .floating-text{
      font-size:22px;
      color:#a3b3c7;
      margin-top:10px;
      min-height:30px;
      opacity:0;
      transform:translateY(20px);
      transition:all 0.8s ease;
    }

    .floating-text.show{
      opacity:1;
      transform:translateY(0);
    }

    section{
      padding:80px 10%;
    }

    .section-title{
      font-size:32px;
      margin-bottom:20px;
      position:relative;
    }

    .section-title::after{
      content:'';
      width:60px;
      height:3px;
      background:#00d4ff;
      position:absolute;
      left:0;
      bottom:-10px;
    }

    .card-box{
      background:#121a2b;
      padding:20px;
      border-radius:12px;
    }

    .chatbox{
      position:fixed;
      bottom:90px;
      right:20px;
      width:300px;
      background:#111827;
      border-radius:12px;
      display:none;
    }

    .chat-header{
      background:#00d4ff;
      color:#000;
      padding:10px;
      font-weight:bold;
    }

    .chat-body{
      height:250px;
      overflow-y:auto;
      padding:10px;
      font-size:14px;
    }

    .chat-input{
      display:flex;
    }

    .chat-input input{
      flex:1;
      padding:10px;
      border:none;
      outline:none;
    }

    .chat-input button{
      padding:10px;
      background:#00d4ff;
      border:none;
      font-weight:bold;
    }

    .chat-toggle{
      position:fixed;
      bottom:20px;
      right:20px;
      width:55px;
      height:55px;
      border-radius:50%;
      background:#00d4ff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:22px;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-icon">&lt;/&gt;</div>

  <!-- ✅ BOLD HEADING -->
  <h1><strong>Hi, I'm Sheethal 👋</strong></h1>

  <div id="floatingText" class="floating-text show">
    Undergraduate Computer Science Student | Full Stack Developer | AI Enthusiast
  </div>

  <div style="margin-top:20px;">
    <a href="https://github.com/BodaSheethal" style="color:#00d4ff;font-size:26px;margin:0 10px;"><i class="fab fa-github"></i></a>
    <a href="https://www.linkedin.com/in/sheethal-b-9457b432a" style="color:#00d4ff;font-size:26px;margin:0 10px;"><i class="fab fa-linkedin"></i></a>
    <a href="mailto:bodasheethal@gmail.com" style="color:#00d4ff;font-size:26px;margin:0 10px;"><i class="fas fa-envelope"></i></a>
  </div>
</section>

<!-- CHATBOT -->
<div class="chatbox" id="chatbox">
  <div class="chat-header">Sheethal Bot</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input id="msg" placeholder="Ask..." />
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<div class="chat-toggle" onclick="toggleChat()">💬</div>

<script>
// FLOATING TEXT
const texts = [
  "Undergraduate Computer Science Student | Full Stack Developer | AI Enthusiast",
  "Building Projects & Learning Daily",
  "Passionate About Web & AI"
];
let i = 0;
const el = document.getElementById("floatingText");

setInterval(() => {
  el.classList.remove("show");
  setTimeout(() => {
    i = (i + 1) % texts.length;
    el.textContent = texts[i];
    el.classList.add("show");
  }, 500);
}, 2500);

// CHATBOT (CONTACT FIXED)
function toggleChat(){
  let box = document.getElementById("chatbox");
  box.style.display = box.style.display === "block" ? "none" : "block";
}

function sendMsg(){
  let input = document.getElementById("msg");
  let chat = document.getElementById("chatBody");
  let text = input.value.trim();
  if(text === "") return;

  chat.innerHTML += `<div>You: ${text}</div>`;

  let lower = text.toLowerCase();
  let reply = "Ask about skills, projects, experience, or contact.";

  if(lower.includes("contact") || lower.includes("email") || lower.includes("linkedin") || lower.includes("reach")){
    reply = "📧 Email: bodasheethal@gmail.com<br>🔗 LinkedIn: linkedin.com/in/sheethal-b-9457b432a";
  }
  else if(lower.includes("skills")){
    reply = "HTML, CSS, JavaScript, React, Node.js, Python, Java, C, C++, Excel, Power BI.";
  }
  else if(lower.includes("experience")){
    reply = "No formal experience yet, but I built real-world projects.";
  }
  else if(lower.includes("project")){
    reply = "Live Medicine Availability Finder + Portfolio Website.";
  }

  chat.innerHTML += `<div style="color:#00d4ff">Bot: ${reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
  input.value = "";
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("msg").addEventListener("keydown", e => {
    if(e.key === "Enter"){ e.preventDefault(); sendMsg(); }
  });
});
</script>

</body>
</html>
